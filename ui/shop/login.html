<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}}</title>
	<link rel="stylesheet" href="/styles.css">
	<script src="https://unpkg.com/htmx.org@1.9.10"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		body { font-family: 'Space Grotesk', sans-serif; }
		.glow { box-shadow: 0 20px 60px rgba(15,23,42,0.25); }
		.bg-grid {
			background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.12) 1px, transparent 0);
			background-size: 40px 40px;
		}
	</style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
	<div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900"></div>
	<div class="relative min-h-screen flex flex-col">
		<header class="p-6">
			<a href="/" class="inline-flex items-center gap-3 text-slate-100/80 hover:text-white transition">
				<span class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20">↩</span>
				<span class="text-lg tracking-wide">Return to Shop</span>
			</a>
		</header>
		<main class="flex-1 flex items-center justify-center px-6 pb-16">
			<section class="w-full max-w-xl bg-white/5 border border-white/10 rounded-3xl p-10 glow">
				<div class="text-center mb-10">
					<p class="uppercase text-xs tracking-[0.4em] text-emerald-300/70 mb-3">Admin Access</p>
					<h1 class="text-4xl font-semibold text-white mb-4">Sign in with Google</h1>
					<p class="text-slate-300 text-base">Use your Supabase-managed Google account to access the control room.</p>
				</div>
				<div class="bg-grid rounded-2xl p-8 border border-white/10">
					<p class="text-sm text-slate-300 mb-6">We authenticate via Supabase Auth. After signing in you'll be redirected back with a secure session.</p>
					<button id="google-login" class="w-full inline-flex items-center justify-center gap-3 bg-white text-slate-900 py-3 rounded-xl font-semibold text-base hover:bg-emerald-50 transition focus:outline-none">
						<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
						Continue with Google
					</button>
				</div>
				<p class="text-center text-xs text-slate-500 mt-8">Protected by Supabase · Redirect: {{.OAuthRedirectURL}}</p>
			</section>
		</main>
	</div>

	<script type="module">
		import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.43.4'
		const supabase = createClient('{{.SupabaseURL}}', '{{.SupabaseAnonKey}}', {
			auth: { detectSessionInUrl: false }
		})

		document.getElementById('google-login').addEventListener('click', async () => {
			const { error } = await supabase.auth.signInWithOAuth({
				provider: 'google',
				options: {
					scopes: 'email profile',
					redirectTo: '{{.OAuthRedirectURL}}'
				}
			})
			if (error) alert('Authentication failed: ' + error.message)
		})
	</script>
</body>
</html>
