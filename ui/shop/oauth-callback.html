<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}}</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
		body { font-family: 'Space Grotesk', sans-serif; }
	</style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center text-white">
	<div class="text-center space-y-6">
		<div class="w-16 h-16 rounded-full border-2 border-white/30 flex items-center justify-center mx-auto animate-spin">
			<div class="w-12 h-12 rounded-full border-2 border-white/60"></div>
		</div>
		<div>
			<h1 class="text-3xl font-semibold">Completing sign-in…</h1>
			<p class="text-slate-400 mt-3">Securely storing your session before redirecting.</p>
		</div>
	</div>

	<script type="module">
		import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.43.4'
		const supabase = createClient('{{.SupabaseURL}}', '{{.SupabaseAnonKey}}', {
			auth: { detectSessionInUrl: true }
		})

		supabase.auth.onAuthStateChange(async (event, session) => {
			if (event === 'SIGNED_IN' && session?.access_token) {
				document.cookie = `sb-access-token=${session.access_token}; Path=/; Max-Age=3600; Secure; SameSite=Lax`
				window.location.href = '{{.SuccessRedirect}}'
			} else if (event === 'SIGNED_OUT' || !session) {
				window.location.href = '{{.FailureRedirect}}'
			}
		})
	</script>
</body>
</html>
