<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.43.4'
        window.supabase = createClient('{{.SupabaseURL}}', '{{.SupabaseAnonKey}}')
        window.supabaseReady = true
        window.dispatchEvent(new Event('supabase-ready'))
    </script>
    <script src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js" defer></script>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <a href="/" class="text-2xl font-bold text-gray-900">Shop</a>
                <div class="flex items-center gap-4">
                    <form action="/search" method="get" class="relative">
                        <input 
                            type="text" 
                            name="q" 
                            placeholder="Search products..." 
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                        >
                    </form>
                    <a href="/cart" class="px-4 py-2 text-gray-700 hover:text-gray-900">Cart</a>
                    
                    <!-- User Auth Section -->
                    <div x-data="authState()" x-init="init()" class="flex items-center gap-3">
                        <!-- Loading State -->
                        <div x-show="loading" class="w-8 h-8 rounded-full bg-gray-200 animate-pulse"></div>
                        
                        <!-- Signed In State -->
                        <div x-show="!loading && user" x-cloak class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="flex items-center gap-2 hover:opacity-80 transition">
                                <img :src="user?.user_metadata?.avatar_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user?.email || 'User')" 
                                     :alt="user?.email" 
                                     class="w-8 h-8 rounded-full border-2 border-gray-300">
                                <span class="text-sm font-medium text-gray-700" x-text="user?.user_metadata?.full_name || user?.email"></span>
                            </button>
                            
                            <!-- Dropdown Menu -->
                            <div x-show="open" 
                                 @click.away="open = false"
                                 x-transition
                                 class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
                                <a href="/orders" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">My Orders</a>
                                <a href="/profile" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
                                <hr class="my-1">
                                <button @click="signOut()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Sign Out</button>
                            </div>
                        </div>
                        
                        <!-- Signed Out State -->
                        <div x-show="!loading && !user" x-cloak>
                            <a href="/login" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Sign In</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Premium Products</h1>
        
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            {{range $index, $product := .Products}}
            <div class="product-card bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow"
                {{if eq $index 17}}
                hx-get="/api/products?cursor={{$product.ID}}" 
                hx-trigger="revealed" 
                hx-swap="afterend"
                {{end}}>
                <a href="/products/{{$product.Slug}}">
                    <img src="{{$product.ImageThumbURL}}" alt="{{$product.Name}}" loading="lazy" class="product-image">
                    <div class="p-4">
                        <h3 class="product-name text-lg font-semibold text-gray-900 mb-2">{{$product.Name}}</h3>
                        <p class="product-price text-xl font-bold text-blue-600">${{printf "%.2f" $product.Price}}</p>
                        {{if gt $product.Stock 0}}
                        <p class="text-sm text-green-600 mt-2">In Stock</p>
                        {{else}}
                        <p class="text-sm text-red-600 mt-2">Out of Stock</p>
                        {{end}}
                    </div>
                </a>
            </div>
            {{end}}
        </div>

        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900"></div>
        </div>
    </main>

    <footer class="bg-white border-t mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <p class="text-center text-gray-600">&copy; 2026 Shop. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Alpine.js auth state component
        function authState() {
            return {
                user: null,
                loading: true,
                async init() {
                    // Wait for Supabase to be ready
                    if (!window.supabase) {
                        await new Promise(resolve => {
                            window.addEventListener('supabase-ready', resolve, { once: true })
                        })
                    }
                    
                    const { data: { session } } = await window.supabase.auth.getSession()
                    this.user = session?.user || null
                    this.loading = false
                    
                    // Listen for auth changes
                    window.supabase.auth.onAuthStateChange((event, session) => {
                        this.user = session?.user || null
                    })
                },
                async signOut() {
                    await window.supabase.auth.signOut()
                    document.cookie = 'sb-access-token=; Path=/; Max-Age=0'
                    window.location.href = '/'
                }
            }
        }
        
        // Show loading indicator during HTMX requests
        document.body.addEventListener('htmx:beforeRequest', function() {
            document.getElementById('loading').classList.remove('hidden');
        });
        document.body.addEventListener('htmx:afterRequest', function() {
            document.getElementById('loading').classList.add('hidden');
        });
    </script>
</body>
</html>
