{{ define "product_card_grid" }}
	<a href="/products/{{ .Product.Slug }}" class="block">
		<div
			class="aspect-square overflow-hidden rounded-lg bg-gray-200 mb-4 relative flex items-center justify-center"
		>
			{{ if .Product.ImageThumbURL }}
				<img
					src="{{ .Product.ImageThumbURL }}"
					alt="{{ .Product.Name }}"
					width="400"
					height="400"
					{{ if .Priority }}
						fetchpriority="high" loading="eager"
					{{ else }}
						loading="lazy"
					{{ end }}
					class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-300"
					onerror="this.style.display = 'none'"
				/>
			{{ end }}
			<div
				class="w-3/4 aspect-3/1 border-2 border-gray-400 rounded-md flex items-center justify-center"
			>
				<div class="w-16 h-16 rounded-full bg-gray-400"></div>
			</div>
		</div>
		<h3 class="text-lg font-medium text-gray-900 mb-2">{{ .Product.Name }}</h3>
		<div class="flex items-center justify-between">
			<p class="text-xl font-semibold text-gray-900">${{ printf "%.2f" .Product.Price }}</p>
			{{ if gt .Product.Stock 0 }}
				<span class="text-sm text-green-700">In Stock</span>
			{{ else }}
				<span class="text-sm text-red-600">Out of Stock</span>
			{{ end }}
		</div>
	</a>
{{ end }}
