{{ define "home" }}{{ template "base" . }}{{ end }}
{{ define "page_root" }}
	<div id="page-root" hx-history-elt>
		{{ if .Categories }}
			<nav class="border-b border-gray-100 bg-white sticky top-0 z-10">
				<div
					class="max-w-7xl mx-auto px-6 flex gap-6 overflow-x-auto py-3"
					style="scrollbar-width:none"
				>
					<a
						href="/"
						class="text-sm whitespace-nowrap transition-colors {{ if eq .ActiveCategory "" }}
							font-semibold text-gray-900
						{{ else }}
							text-gray-500 hover:text-gray-900
						{{ end }}"
						>All</a
					>
					{{ range .Categories }}
						<a
							href="/?category={{ .Slug }}"
							class="text-sm whitespace-nowrap transition-colors {{ if eq $.ActiveCategory .Slug }}
								font-semibold text-gray-900
							{{ else }}
								text-gray-500 hover:text-gray-900
							{{ end }}"
							>{{ .Name }}</a
						>
					{{ end }}
				</div>
			</nav>
		{{ end }}

		<main class="max-w-7xl mx-auto px-6 py-16 min-h-[calc(100vh-8rem)]">
			{{ template "products_grid" . }}
		</main>
	</div>
{{ end }}
