{{define "cart"}}
{{template "base" .}}
{{end}}

{{define "page_root"}}
<div id="page-root" hx-history-elt class="flex-1">
    {{block "content" .}}{{end}}
</div>
{{end}}

{{define "content"}}
    <main class="max-w-6xl mx-auto px-6 py-12 min-h-[calc(100vh-8rem)]" x-data="cartPage()" x-init="loadCart()">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Your Cart</h1>

        <template x-if="items.length === 0">
            <div class="rounded-lg border border-gray-200 bg-white p-8 text-center">
                <p class="text-gray-600">Your cart is empty</p>
                <a href="/" class="mt-4 inline-flex items-center gap-2 text-sm text-gray-600 hover:text-gray-900">
                    ← Continue shopping
                </a>
            </div>
        </template>

        <div x-show="items.length > 0" x-cloak class="space-y-6">
            <div class="rounded-lg border border-gray-200 bg-white divide-y divide-gray-100">
                <template x-for="item in items" :key="item.slug">
                    <div class="flex items-start gap-4 p-6">
                        <div class="w-24 h-24 rounded-lg bg-gray-100 overflow-hidden flex items-center justify-center">
                            <template x-if="item.image">
                                <img :src="item.image" :alt="item.name" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                            </template>
                            <div :class="{'hidden': item.image}" class="w-3/4 aspect-[3/1] border-2 border-gray-400 rounded-md flex items-center justify-center">
                                <div class="w-10 h-10 rounded-full bg-gray-400"></div>
                            </div>
                        </div>
                        <div class="flex-1">
                            <div class="flex items-start justify-between">
                                <div>
                                    <a :href="item.url" class="text-lg font-semibold text-gray-900" x-text="item.name"></a>
                                    <p class="text-sm text-gray-500 mt-1" x-text="`$${item.price}`"></p>
                                </div>
                                <button @click="removeItem(item.slug)" class="text-sm text-gray-500 hover:text-gray-900">Remove</button>
                            </div>
                            <div class="flex items-center gap-4 mt-4">
                                <button @click="decreaseQuantity(item)" class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-300">−</button>
                                <span class="w-12 text-center font-semibold" x-text="item.quantity"></span>
                                <button @click="increaseQuantity(item)" class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-300">+</button>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-semibold text-gray-900" x-text="`$${(item.price * item.quantity).toFixed(2)}`"></p>
                        </div>
                    </div>
                </template>
            </div>

            <div class="rounded-lg border border-gray-200 bg-white p-6">
                <div class="flex items-center justify-between text-lg">
                    <span class="text-gray-600">Subtotal</span>
                    <span class="font-semibold text-gray-900" x-text="`$${total().toFixed(2)}`"></span>
                </div>
                <p class="text-sm text-gray-500 mt-2">Taxes and shipping calculated at checkout</p>
                <button class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 mt-4">Checkout</button>
            </div>
        </div>
    </main>
{{end}}

{{define "scripts"}}
<script>
    const CART_KEY = 'cart';

    function getStoredCart() {
        try {
            return JSON.parse(localStorage.getItem(CART_KEY)) || [];
        } catch (e) {
            return [];
        }
    }

    function saveCart(items) {
        localStorage.setItem(CART_KEY, JSON.stringify(items));
    }

    function cartPage() {
        return {
            items: [],
            loadCart() {
                this.items = getStoredCart();
            },
            increaseQuantity(item) {
                item.quantity += 1;
                saveCart(this.items);
            },
            decreaseQuantity(item) {
                if (item.quantity > 1) {
                    item.quantity -= 1;
                    saveCart(this.items);
                }
            },
            removeItem(slug) {
                this.items = this.items.filter(item => item.slug !== slug);
                saveCart(this.items);
            },
            total() {
                return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }
        }
    }
</script>
{{end}}
