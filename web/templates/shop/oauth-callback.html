{{ define "oauth_callback" }}
	<!doctype html>
	<html lang="en" class="h-full">
		<head>
			<meta charset="UTF-8" />
			<meta name="viewport" content="width=device-width, initial-scale=1.0" />
			<title>Signing In...</title>
			<link rel="stylesheet" href="/dist/styles.css" />
		</head>
		<body class="h-full flex items-center justify-center bg-white">
			<div
				id="config"
				data-supabase-url="{{ .SupabaseURL }}"
				data-supabase-anon-key="{{ .SupabaseAnonKey }}"
				data-success-redirect="{{ .SuccessRedirect }}"
				data-failure-redirect="{{ .FailureRedirect }}"
				class="text-center"
			>
				<div
					class="w-10 h-10 rounded-full border-3 border-gray-200 border-t-gray-900 animate-spin mx-auto"
				></div>
				<h1 class="mt-5 mb-2.5 text-xl font-semibold text-gray-900">Signing in...</h1>
				<p class="text-sm text-gray-500">Please wait</p>
			</div>
			<script src="/dist/oauth-callback.js" defer></script>
		</body>
	</html>
{{ end }}
