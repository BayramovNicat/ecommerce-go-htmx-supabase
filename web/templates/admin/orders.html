<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ .Title }}</title>
		<link rel="stylesheet" href="/dist/styles.css" />
		<script src="/dist/bundle.js" defer></script>
	</head>
	<body class="bg-gray-100">
		<div class="flex h-screen">
			<!-- Sidebar -->
			<aside class="w-64 bg-gray-900 text-white">
				<div class="p-6">
					<h1 class="text-2xl font-bold">Admin Panel</h1>
				</div>
				<nav class="mt-6">
					<a href="/admin" class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent">
						Dashboard
					</a>
					<a
						href="/admin/products"
						class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent"
					>
						Products
					</a>
					<a
						href="/admin/orders"
						class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-blue-500"
					>
						Orders
					</a>
					<a href="/" class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent">
						View Shop
					</a>
				</nav>
			</aside>

			<!-- Main Content -->
			<main class="flex-1 overflow-y-auto">
				<header class="bg-white shadow-sm">
					<div class="px-8 py-4">
						<h2 class="text-2xl font-bold text-gray-900">Manage Orders</h2>
					</div>
				</header>

				<div class="p-8">
					<div class="bg-white rounded-lg shadow">
						<div class="p-6">
							<p class="text-gray-600">Orders management coming soon...</p>
						</div>
					</div>
				</div>
			</main>
		</div>
	</body>
</html>
