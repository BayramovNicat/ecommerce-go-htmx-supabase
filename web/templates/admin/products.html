<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>{{ .Title }}</title>
		<link rel="stylesheet" href="/dist/styles.css" />
		<script src="/dist/bundle.js" defer></script>
	</head>
	<body class="bg-gray-100">
		<div class="flex h-screen">
			<!-- Sidebar -->
			<aside class="w-64 bg-gray-900 text-white">
				<div class="p-6">
					<h1 class="text-2xl font-bold">Admin Panel</h1>
				</div>
				<nav class="mt-6">
					<a href="/admin" class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent">
						Dashboard
					</a>
					<a
						href="/admin/products"
						class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-blue-500"
					>
						Products
					</a>
					<a
						href="/admin/orders"
						class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent"
					>
						Orders
					</a>
					<a href="/" class="block px-6 py-3 hover:bg-gray-800 border-l-4 border-transparent">
						View Shop
					</a>
				</nav>
			</aside>

			<!-- Main Content -->
			<main class="flex-1 overflow-y-auto">
				<header class="bg-white shadow-sm">
					<div class="px-8 py-4 flex justify-between items-center">
						<h2 class="text-2xl font-bold text-gray-900">Manage Products</h2>
						<button
							@click="showModal = true"
							x-data="{ showModal: false }"
							class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
						>
							Add Product
						</button>
					</div>
				</header>

				<div class="p-8">
					<div class="bg-white rounded-lg shadow overflow-hidden">
						<table class="min-w-full divide-y divide-gray-200">
							<thead class="bg-gray-50">
								<tr>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										ID
									</th>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										Name
									</th>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										Price
									</th>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										Stock
									</th>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										Status
									</th>
									<th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">
										Actions
									</th>
								</tr>
							</thead>
							<tbody class="bg-white divide-y divide-gray-200">
								{{ range .Products }}
									<tr>
										<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ .ID }}</td>
										<td class="px-6 py-4 whitespace-nowrap">
											<div class="text-sm font-medium text-gray-900">{{ .Name }}</div>
											<div class="text-sm text-gray-500">{{ .Slug }}</div>
										</td>
										<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
											${{ printf "%.2f" .Price }}
										</td>
										<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ .Stock }}</td>
										<td class="px-6 py-4 whitespace-nowrap">
											{{ if .IsActive }}
												<span
													class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800"
													>Active</span
												>
											{{ else }}
												<span
													class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800"
													>Inactive</span
												>
											{{ end }}
										</td>
										<td class="px-6 py-4 whitespace-nowrap text-sm">
											<button class="text-blue-600 hover:text-blue-900 mr-3">Edit</button>
											<button
												hx-delete="/admin/products/{{ .ID }}"
												hx-confirm="Are you sure you want to delete this product?"
												hx-target="closest tr"
												hx-swap="outerHTML swap:1s"
												class="text-red-600 hover:text-red-900"
											>
												Delete
											</button>
										</td>
									</tr>
								{{ end }}
							</tbody>
						</table>
					</div>
				</div>
			</main>
		</div>

		<!-- Add Product Modal -->
		<div
			x-data="{ showModal: false }"
			x-show="showModal"
			class="fixed inset-0 z-50 overflow-y-auto"
			style="display: none"
		>
			<div class="flex items-center justify-center min-h-screen px-4">
				<div
					class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
					@click="showModal = false"
				></div>

				<div class="relative bg-white rounded-lg max-w-2xl w-full p-6">
					<h3 class="text-lg font-semibold text-gray-900 mb-4">Add New Product</h3>

					<form hx-post="/admin/products" hx-target="body">
						<div class="space-y-4">
							<div>
								<label class="block text-sm font-medium text-gray-700">Name</label>
								<input
									type="text"
									name="name"
									required
									class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
								/>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700">Slug</label>
								<input
									type="text"
									name="slug"
									required
									class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
								/>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700">Description</label>
								<textarea
									name="description"
									rows="3"
									class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
								></textarea>
							</div>
							<div class="grid grid-cols-2 gap-4">
								<div>
									<label class="block text-sm font-medium text-gray-700">Price</label>
									<input
										type="number"
										name="price"
										step="0.01"
										required
										class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
									/>
								</div>
								<div>
									<label class="block text-sm font-medium text-gray-700">Stock</label>
									<input
										type="number"
										name="stock"
										required
										class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
									/>
								</div>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700">Image URL</label>
								<input
									type="text"
									name="image_url"
									class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
								/>
							</div>
							<div>
								<label class="block text-sm font-medium text-gray-700">Thumbnail URL</label>
								<input
									type="text"
									name="image_thumb_url"
									class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2"
								/>
							</div>
							<div>
								<label class="flex items-center">
									<input type="checkbox" name="is_active" value="true" checked class="mr-2" />
									<span class="text-sm font-medium text-gray-700">Active</span>
								</label>
							</div>
						</div>

						<div class="mt-6 flex justify-end gap-3">
							<button
								type="button"
								@click="showModal = false"
								class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50"
							>
								Cancel
							</button>
							<button
								type="submit"
								class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
							>
								Create Product
							</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
